  postgres:
    image: postgres
    container_name: postgres
    restart: unless-stopped
    ports:
      - 5433:5432
    volumes:
      - postgres:/data/db
      - postgres_config:/data/configdb
    environment:
      POSTGRES_PASSWORD: 'Password123'
      POSTGRES_USER: 'scheduler'
      POSTGRES_DB: 'schedulerDB'

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

